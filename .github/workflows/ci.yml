name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Check generated distributions
        run: npm run generate -- --check

      - name: Validate contracts
        run: npm run validate

      - name: Run check suite
        run: npm run check

      - name: Run deterministic eval
        run: npm run eval

      - name: Run public-beta release gate
        run: npm run release:check

      - name: Run stable GA blocker report
        run: npm run release:check:ga -- --json
        continue-on-error: true
